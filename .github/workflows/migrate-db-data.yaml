name: Migrate DB Data (AWS Glue Job)

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select the environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, qat, preprod, prod]
      dry_run:
        description: "Dry Run? (no changes will be made to the data)"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      migrations:
        description: "Select which data migration to run (Applicant migration or adding 'applicantStatusGroup' to Applications or both)"
        required: true
        default: "application_statusgroup"
        type: choice
        options: ["applicant_migration", "application_statusgroup"]

jobs:
  migrate_applicant_data:
    name: Migrate Applicant/Application Data (trigger Glue job)
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: "arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE_NAME }}"

      - name: Trigger Glue job (migration script)
        run: |
          aws glue start-job-run --job-name "${{ vars.GLUE_MIGRATION_JOB_NAME }}" \
            --arguments '{"--APPLICANT_TABLE":"${{ vars.GLUE_APPLICANT_TABLE_NAME }}","--APPLICATION_TABLE":"${{ vars.GLUE_APPLICATION_TABLE_NAME }}","--MIGRATIONS":"${{ github.event.inputs.migrations }}","--AWS_REGION":"${{ vars.AWS_REGION }}","--DRY_RUN":"${{ github.event.inputs.dry_run }}"}'
