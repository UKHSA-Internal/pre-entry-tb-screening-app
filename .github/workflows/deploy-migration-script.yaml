name: Upload Migration Script

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select the environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, qat, preprod, prod]

jobs:
  upload-migration-script:
    name: Copy migration script to S3 bucket
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      MIGRATION_SCRIPT_S3_BUCKET: ${{ vars.MIGRATION_SCRIPT_S3_BUCKET }}
      MIGRATION_FILE: "migration_script.py"

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION}}
          role-to-assume: "arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE_NAME }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload Spec to s3
        run: aws s3 cp ${{ env.MIGRATION_FILE }} s3://${{ env.MIGRATION_SCRIPT_S3_BUCKET }}/scripts/ --sse aws:kms --sse-kms-key-id ${{ vars.SSE_KEY_ID }}
        working-directory: "./scripts/applicant_migration/src/"
