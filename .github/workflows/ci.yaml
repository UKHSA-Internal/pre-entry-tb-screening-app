name: Pets CI

on:
  push:
    branches: [main, develop, release/**]
  pull_request:
    branches: [main, develop, release/**]

  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  linting:
    name: Run linting checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i

      - name: Linting Checks
        run: pnpm -r lint

      - name: Type Checks
        run: pnpm -r type-check

  ui-tests:
    name: Run unit tests for ui
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm i

      - name: Run unit tests
        run: pnpm run test-coverage --testTimeout=10000
        working-directory: pets-ui

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ui
          path: pets-ui/coverage/

  core-services-tests:
    name: Run tests for core services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i

      - name: Start Local Environment
        run: |
          pnpm start & sleep 120

      - name: Wait for Localstack healthcheck
        run: |
          until curl -fsS http://localhost:4566/_localstack/health | grep '"running"'; do
            COUNT=$((COUNT + 1))
            if [ "$COUNT" -ge 24 ]; then
              echo "Localstack healthcheck failed after 2 minutes"
              exit 1
            fi
            echo "Waiting for healthcheck to pass"
            sleep 5
          done
          echo "Healthcheck passed"
          sleep 20

      - name: Run tests
        run: pnpm test-coverage
        working-directory: pets-core-services

      - name: Capture Docker Compose logs
        if: failure() || success()
        run: |
          mkdir -p logs
          docker compose logs > logs/docker-compose.log
          docker compose down

      - name: Upload Docker Compose logs
        if: failure() || success()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: logs/docker-compose.log

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core-services
          path: pets-core-services/coverage/

  migration-script-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check migration_script changed
        working-directory: "scripts/applicant_migration/"
        id: check_file_changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          run_tests=$(./file_changed.sh)
          echo "run tests?: $run_tests"
          echo "run_tests=$run_tests" >> $GITHUB_OUTPUT

      - name: Setting up Python
        if: steps.check_file_changed.outputs.run_tests == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        if: steps.check_file_changed.outputs.run_tests == 'true'
        working-directory: "scripts/applicant_migration/"
        run: python -m pip install -r requirements.txt

      - name: Run unit tests for applicant migration script
        if: steps.check_file_changed.outputs.run_tests == 'true'
        working-directory: "scripts/applicant_migration/"
        run: python -m pytest -c ./pytest.ini --cov=migration_script --cov-report=term-missing ./src/test_unit.py

      - name: Run integration tests for applicant migration script
        if: steps.check_file_changed.outputs.run_tests == 'true'
        working-directory: "scripts/applicant_migration/"
        run: python -m pytest -c ./pytest.ini --cov=migration_script --cov-report=term-missing ./src/test_integration.py

  onboarding-script-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check clinics_data_load.py changed
        working-directory: "scripts/"
        id: check_file_changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          FILE: "scripts/onboarding_glue_job/src/clinics_data_load.py"
        run: |
          run_tests=$(./file_changed.sh ${{ env.FILE }})
          echo "run tests?: $run_tests"
          echo "run_tests=$run_tests" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.check_file_changed.outputs.run_tests == 'true'
        uses: actions/setup-python@v6
        with:
          python-version-file: "scripts/onboarding_glue_job/.python-version"

      - name: Install uv
        if: steps.check_file_changed.outputs.run_tests == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          # Install a specific version of uv.
          version: "0.9.18"

      - name: Install the project
        if: steps.check_file_changed.outputs.run_tests == 'true'
        working-directory: "scripts/onboarding_glue_job/"
        run: uv sync --locked

      - name: Run unit tests for applicant onboarding script
        if: steps.check_file_changed.outputs.run_tests == 'true'
        working-directory: "scripts/onboarding_glue_job/"
        run: uv run pytest -c ./pyproject.toml --cov=clinics_data_load --cov-report=term-missing ./src/test_unit.py

      - name: Run integration tests for applicant onboarding script
        if: steps.check_file_changed.outputs.run_tests == 'true'
        working-directory: "scripts/onboarding_glue_job/"
        run: uv run pytest -c ./pyproject.toml --cov=clinics_data_load --cov-report=term-missing ./src/test_integration.py

  sonar-scan:
    runs-on: ubuntu-latest
    needs: [ui-tests, core-services-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Disabling shallow clone is recommended for improving relevancy of reporting
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i

      - name: Download UI coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-ui
          path: pets-ui/coverage/

      - name: Download Core Services coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-core-services
          path: pets-core-services/coverage/

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

  build:
    name: Create UI build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm i

      - name: Create UI build
        run: pnpm run build
        working-directory: pets-ui
