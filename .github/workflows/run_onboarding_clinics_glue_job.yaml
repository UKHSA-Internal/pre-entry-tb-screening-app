name: Add new clinics

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select the environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, qat, preprod]

jobs:
  upload-onboarding-script:
    name: Copy clinics onboarding script to S3 bucket
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      ONBOARDING_FILE: "clinics_data_load.py"

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION}}
          role-to-assume: "arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE_NAME }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Upload file to s3
        run: aws s3 cp ${{ env.ONBOARDING_FILE }} s3://${{ vars.ONBOARDING_SCRIPT_S3_BUCKET }}/ --sse aws:kms --sse-kms-key-id ${{ vars.SSE_KEY_ID }}
        working-directory: "./scripts/onboarding_glue_job/src/"

  add_clinics:
    name: Add clinics from CSV file (trigger Glue job)
    needs: upload-onboarding-script
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: "arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE_NAME }}"

      - name: Trigger Glue job (migration script)
        run: |
          aws glue start-job-run --job-name "${{ vars.GLUE_MIGRATION_JOB_NAME }}" \
            --arguments '{"--customer-executor-env-vars":"ONBOARDING_CLINICS_TABLE=${{ vars.ONBOARDING_CLINICS_TABLE }}"}'
