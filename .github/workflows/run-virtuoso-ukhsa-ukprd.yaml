name: Run Virtuoso Goal

on:
  push:
    branches:
      - feature/TBBETA-2067-virtuoso-tests

jobs:
  run-virtuoso:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create scripts folder
        run: mkdir -p scripts

      - name: Download Virtuoso Shell Script
        run: |
          echo "#!/usr/bin/env bash" > scripts/execute.sh
          echo "# Source: https://docs.virtuoso.qa/integration/execute.sh" >> scripts/execute.sh
          curl -s https://docs.virtuoso.qa/integration/execute.sh >> scripts/execute.sh

      - name: Make Script Executable
        run: chmod +x scripts/execute.sh

      - name: Execute Virtuoso Goal
        run: |
          ./scripts/execute.sh \
            --token ${{ secrets.VIRTUOSOUKPRD_API_TOKEN }} \
            --goal_id 490 \
            --app
